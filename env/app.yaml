env: "app"

gate:
  addr: "0.0.0.0:8888"

base:
  platId : 1
  serverId: 1

log:
  path: "./tmp/logs/"
  level: "debug"
  format: "console"
  maxSize: 1024 #单个文件最大多少，单位M
  maxBackups: 10 #最多保留多少个文件
  maxAge: 7 #保留天数
  compress: true  # 压缩旧日志
  console: true   # 同时输出到控制台
  banProto: [1000]

#监控
monitoring:
  metricAddr: ":9091"
  pprofAddr: ":6060"

db:
  host: "127.0.0.1"
  port: "3306"
  user: "root"
  pass: "123456"
  name: "game_db"

redis:
  addr: "localhost:6379"
  db: 0
