<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CakeGo 登录&选角&创建角色Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #1f2937;
            color: #fff;
            padding: 40px;
        }
        .container {
            width: 450px;
            margin: 0 auto;
        }
        .page {
            background: #374151;
            padding: 30px;
            border-radius: 10px;
        }
        .hidden {
            display: none;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
        }
        .form-item {
            margin-bottom: 16px;
        }
        .form-item label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #d1d5db;
        }
        .form-item input,
        .form-item select {
            width: 100%;
            height: 38px;
            padding: 0 10px;
            border-radius: 4px;
            border: none;
            background: #4b5563;
            color: #fff;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            height: 42px;
            background-color: #0284c7;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #0369a1;
        }
        .btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .btn-secondary {
            background-color: #475569;
            margin-top: 12px;
        }
        .role-item {
            background: #4b5563;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .role-item:hover {
            background: #57657a;
        }
        .role-item p {
            margin: 4px 0;
            font-size: 14px;
            color: #e5e7eb;
        }
        .log-panel {
            width: 800px;
            margin: 30px auto 0;
        }
        .log-panel h3 {
            margin-bottom: 10px;
            color: #34d399;
        }
        #logBox {
            width: 100%;
            height: 320px;
            background: #111827;
            padding: 15px;
            border-radius: 6px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 13px;
            color: #a5f3fc;
            white-space: pre-wrap;
        }
        /* 创建角色弹窗样式 */
        .create-role-box {
            margin-top:20px;
            padding:20px;
            background:#4b5563;
            border-radius:8px;
        }
        .radio-group{
            display:flex;
            gap:20px;
            margin-top:8px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 登录页面 -->
    <div id="loginPage" class="page">
        <h2>账号登录</h2>
        <div class="form-item">
            <label>账号 Account</label>
            <input type="text" id="account" value="test_player" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <label>服务器ID ServerID</label>
            <select id="serverId">
                <option value="1">1 服</option>
                <option value="2">2 服</option>
            </select>
        </div>
        <button class="btn" id="loginBtn">发起登录</button>
    </div>

    <!-- 选角页面（默认隐藏） -->
    <div id="rolePage" class="page hidden">
        <h2>选择游戏角色</h2>
        <div id="roleListBox">
            <p>正在加载角色列表...</p>
        </div>
        <button class="btn hidden" id="createRoleBtn">创建新角色</button>

        <!-- 创建角色表单 -->
        <div id="createRoleForm" class="create-role-box hidden">
            <div class="form-item">
                <label>角色名称</label>
                <input type="text" id="roleName" placeholder="请输入角色名">
            </div>
            <div class="form-item">
                <label>角色性别</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="1" checked> 男</label>
                    <label><input type="radio" name="gender" value="0"> 女</label>
                </div>
            </div>
            <div class="form-item">
                <label>选择职业</label>
                <select id="career">
                    <option value="1">战士</option>
                    <option value="2">法师</option>
                </select>
            </div>
            <button class="btn" id="submitCreateBtn">确认创建</button>
            <button class="btn btn-secondary" id="cancelCreateBtn">取消</button>
        </div>
    </div>
</div>

<div id="scenePage" class="page hidden" style="width:900px;margin: 40px auto 0;">
    <h2 id="sceneTitle">场景加载中...</h2>
    <div style="margin:10px 0;">
        <span style="margin-left:20px;">地图名称：<span id="mapNameText"></span></span>
        <span style="margin-left:20px;">玩家坐标：<span id="playerPosText"></span></span>
    </div>
    <div style="overflow:auto;width:860px;height:550px;background:#2d3748;border:1px solid #4a5568;margin-top:10px;">
        <canvas id="sceneCanvas" width="860" height="550"></canvas>
    </div>
</div>

<div class="log-panel">
    <h3>通信日志</h3>
    <div id="logBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.3.2/dist/protobuf.min.js"></script>
<script src="index.js"></script>
</body>
</html>
