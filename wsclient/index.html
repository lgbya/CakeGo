<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 网页编码声明，只作用于HTML页面本身 -->
    <meta charset="UTF-8">
</head>
<body>
<!-- 修正正确CDN地址 -->
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.3.2/dist/protobuf.min.js"></script>
<script>
    const ws = new WebSocket("ws://192.168.0.116:8888/ws");
    ws.binaryType = "arraybuffer";

    // ========== 1. 还原你的protobuf协议结构 ==========
    const root = protobuf.Root.fromJSON({
        nested: {
            AccountAuthC2S: {
                fields: {
                    account: { type: "string", id: 1 },
                    server_id: { type: "uint32", id: 2 },
                    plat_id: { type: "uint32", id: 3 },
                    ticket: { type: "string", id: 4 },
                    client_version: { type: "string", id: 5 },
                    channel_id: { type: "uint32", id: 6 }
                }
            },
            AccountAuthS2C: {
                fields: {
                    common_notice: { type: "common.notice", id: 1 },
                    is_auth: { type: "bool", id: 2 }
                }
            },
            "common.notice": {
                fields: {
                    // 根据你common里notice结构体按需补充字段，没有可以先空着
                    err_code: { type: "int32", id: 1 },
                    err_msg: { type: "string", id: 2 }
                }
            }
        }
    });

    // 获取请求、响应协议构造器
    const AccountAuthC2S = root.lookupType("AccountAuthC2S");
    const AccountAuthS2C = root.lookupType("AccountAuthS2C");

    // ========== 2. 工具函数：封包（适配你TCP 4字节大端长度头） ==========
    function encodePacket(protoData, cmd) {
        const bodyLen = protoData.length;
        // 8字节包头：4字节cmd + 4字节包体长度
        const buffer = new ArrayBuffer(8 + bodyLen);
        const view = new DataView(buffer);
        view.setUint32(0, cmd, false);    // 大端写入指令
        view.setUint32(4, bodyLen, false); // 大端写入包体长度
        new Uint8Array(buffer, 8).set(protoData);
        return buffer;
    }

    // 二进制转十六进制调试工具
    function bufferToHex(buf) {
        return Array.from(new Uint8Array(buf))
            .map(b => b.toString(16).padStart(2, "0"))
            .join(" ");
    }

    // ========== 3. WebSocket连接成功，发送登录请求 ==========
    ws.onopen = () => {
        console.log("✅ WebSocket连接成功，开始发送登录协议");

        // 组装登录参数
        const loginData = {
            account: "test_player",
            server_id: 1,
            plat_id: 1,
            ticket: "sdk_verify_ticket_123456",
            client_version: "1.0.0",
            channel_id: 1001
        };

        // 参数校验
        const err = AccountAuthC2S.verify(loginData);
        if (err) {
            console.error("参数错误：", err);
            return;
        }

        // Protobuf序列化
        const msg = AccountAuthC2S.create(loginData);
        const protoBufBin = AccountAuthC2S.encode(msg).finish();
        console.log("📦 登录协议二进制十六进制：", bufferToHex(protoBufBin));

        // 封包后发送
        const sendBuf = encodePacket(protoBufBin, 1001);
        ws.send(sendBuf);

    };

    // ========== 4. 接收服务端返回登录结果 ==========
    ws.onMessage = (e) => {
        const allBytes = new Uint8Array(e.data);
        console.log("📩 收到服务端原始数据包：", bufferToHex(allBytes));

        // 1. 前4字节是包体长度
        const dataView = new DataView(e.data);
        const bodyLen = dataView.getUint32(0, false);
        // 2. 截取后面protobuf包体
        const bodyBytes = allBytes.slice(4, 4 + bodyLen);

        // 3. 反序列化登录返回协议
        const resp = AccountAuthS2C.decode(bodyBytes);
        console.log("🔍 登录返回结果：", resp);
        console.log("是否认证通过：", resp.is_auth);
        console.log("错误信息：", resp.common_notice.err_msg);
    };

    // 异常监听
    ws.onerror = (err) => console.error("❌ 连接异常：", err);
    ws.onclose = () => console.log("🔌 连接已关闭");
</script>
</body>
</html>
